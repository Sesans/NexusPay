services:
  db:
    image: postgres:16-alpine
    container_name: nexuspay-db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - backend

  app:
    build: .
    container_name: nexuspay-app
    depends_on:
      localstack:
        condition: service_healthy
      db:
        condition: service_healthy
    ports:
      - "${SPRING_LOCAL_PORT}:8080"
    environment:
      - DB_URL=jdbc:postgresql://db:5432/${DB_NAME}
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}
    networks:
      - backend

  localstack:
    image: localstack/localstack:4.0
    container_name: nexuspay-localstack
    ports:
      - "4566:4566"
    environment:
      - SERVICES=sqs
      - DEFAULT_REGION=sa-east-1
    volumes:
      - "./localstack-setup.sh:/etc/localstack/init/ready.d/setup.sh"
    networks:
      - backend

volumes:
  db-data:

networks:
  backend:
    driver: bridge
